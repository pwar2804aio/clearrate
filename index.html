<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClearRate Proposal Engine</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f1e; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useCallback, useRef, useEffect } = React;

    // ─── Access Control ──────────────────────────────────────────────────────────
    const APP_PASS_HASH = "b3e2a8f1"; // simple hash of password for comparison
    function checkPass(p) { return p === "AioApp2026!@"; }
    function isAuthenticated() { try { return sessionStorage.getItem("cr_auth") === "1"; } catch { return false; } }
    function setAuthenticated() { try { sessionStorage.setItem("cr_auth", "1"); } catch {} }

    // ─── API Configuration ───────────────────────────────────────────────────────
    const CORS_PROXY = "https://corsproxy.io/?";

    function getSavedKeys() {
      try {
        return {
          anthropicKey: localStorage.getItem("cr_anthropic_key") || "",
          hubspotToken: localStorage.getItem("cr_hubspot_token") || "",
        };
      } catch { return { anthropicKey: "", hubspotToken: "" }; }
    }

    function saveKeys(anthropicKey, hubspotToken) {
      try {
        localStorage.setItem("cr_anthropic_key", anthropicKey);
        localStorage.setItem("cr_hubspot_token", hubspotToken);
      } catch {}
    }

    async function callAnthropic(apiKey, body) {
      const res = await fetch(CORS_PROXY + encodeURIComponent("https://api.anthropic.com/v1/messages"), {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.text();
        throw new Error(`API ${res.status}: ${err}`);
      }
      return res.json();
    }

    function extractDealId(url) {
      const match = url.match(/deal\/(\d+)/);
      return match ? match[1] : null;
    }

    function buildNoteHtml(analysis, proposal, pricingModel, targetMargin) {
      const fc = (n) => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(n || 0);
      const fp = (n) => `${(n * 100).toFixed(2)}%`;
      const modelName = pricingModel === "2-tier" ? "2-Tier" : pricingModel === "interchange-plus" ? "Interchange Plus" : "Flat Rate";

      let ratesHtml = "";
      if (pricingModel === "2-tier") {
        ratesHtml = `<li>Card Present: ${fp(proposal.proposedRates?.cardPresentRate || 0)} + $${(proposal.proposedRates?.cardPresentPerTxn || 0).toFixed(2)}/txn</li><li>Card Not Present: ${fp(proposal.proposedRates?.cardNotPresentRate || 0)} + $${(proposal.proposedRates?.cardNotPresentPerTxn || 0).toFixed(2)}/txn</li>`;
      } else if (pricingModel === "interchange-plus") {
        ratesHtml = `<li>Markup: ${proposal.proposedRates?.basisPoints || 0} BPS above interchange</li><li>Per Transaction: $${(proposal.proposedRates?.perTransaction || 0).toFixed(2)}</li>`;
      } else {
        ratesHtml = `<li>Flat Rate: ${fp(proposal.proposedRates?.flatRate || 0)}</li><li>Per Transaction: $${(proposal.proposedRates?.perTransaction || 0).toFixed(2)}</li>`;
      }

      return `<h2>ClearRate Proposal \u2014 ${analysis.merchantName || "Merchant"}</h2>
<p><strong>Processing Month:</strong> ${analysis.processingMonth || "N/A"} | <strong>Current Processor:</strong> ${analysis.currentProcessorName || "N/A"}</p>
<hr>
<h3>Current State</h3>
<ul>
<li>Monthly Volume: ${fc(analysis.totalVolume)}</li>
<li>Total Fees: ${fc(analysis.totalFees)} (Effective Rate: ${fp(analysis.effectiveRate || 0)})</li>
<li>Interchange: ${fc(analysis.interchangeFees)} | Processor Markup: ${fc(analysis.processorFees)} | Other: ${fc(analysis.otherFees)}</li>
<li>Current Margin Above Interchange: ${fp(analysis.currentMargin || 0)}</li>
</ul>
<h3>Proposed ${modelName} Pricing</h3>
<ul>${ratesHtml}</ul>
<h3>Savings</h3>
<ul>
<li>Monthly Savings: ${fc(proposal.savings?.monthly || 0)}</li>
<li><strong>Annual Savings: ${fc(proposal.savings?.annual || 0)} (${fp(proposal.savings?.savingsPct || 0)} reduction)</strong></li>
<li>New Effective Rate: ${fp(proposal.projectedFees?.effectiveRate || 0)} (was ${fp(analysis.effectiveRate || 0)})</li>
</ul>
<h3>Our Revenue</h3>
<ul>
<li>Target Margin: ${fp(targetMargin)} above interchange</li>
<li>Monthly Revenue: ${fc(proposal.myRevenue?.monthly || 0)}</li>
<li><strong>ARR: ${fc(proposal.myRevenue?.arr || 0)}</strong></li>
</ul>
${proposal.sellingPoints?.length ? `<h3>Key Value Points</h3><ul>${proposal.sellingPoints.map(p => "<li>" + p + "</li>").join("")}</ul>` : ""}
<p><em>${proposal.proposalSummary || ""}</em></p>
<p style="color:#999;font-size:11px">Generated by ClearRate Proposal Engine</p>`;
    }

    async function pushNoteToHubSpot(hubspotToken, dealId, noteHtml) {
      const res = await fetch(CORS_PROXY + encodeURIComponent("https://api.hubapi.com/crm/v3/objects/notes"), {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + hubspotToken,
        },
        body: JSON.stringify({
          properties: {
            hs_note_body: noteHtml,
            hs_timestamp: new Date().toISOString(),
          },
          associations: [{
            to: { id: parseInt(dealId) },
            types: [{ associationCategory: "HUBSPOT_DEFINED", associationTypeId: 214 }],
          }],
        }),
      });
      if (!res.ok) {
        const err = await res.text();
        throw new Error(`HubSpot API ${res.status}: ${err}`);
      }
      return res.json();
    }

    // ─── Helpers ─────────────────────────────────────────────────────────────────
    const STEPS = ["upload", "analysis", "pricing", "proposal"];

    const formatCurrency = (n) =>
      new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(n || 0);

    const formatPct = (n) => `${(n * 100).toFixed(4)}%`;
    const formatPct2 = (n) => `${(n * 100).toFixed(2)}%`;

    function parseAIAnalysis(text) {
      try {
        const clean = text.replace(/```json|```/g, "").trim();
        const start = clean.indexOf("{");
        const end = clean.lastIndexOf("}");
        if (start !== -1 && end !== -1) return JSON.parse(clean.slice(start, end + 1));
      } catch {}
      return null;
    }

    // ─── Main Component ──────────────────────────────────────────────────────────
    function PaymentProposalTool() {
      const [authed, setAuthed] = useState(isAuthenticated());
      const [passInput, setPassInput] = useState("");
      const [passError, setPassError] = useState(false);

      const handleLogin = () => {
        if (checkPass(passInput)) {
          setAuthenticated();
          setAuthed(true);
          setPassError(false);
        } else {
          setPassError(true);
        }
      };

      const saved = getSavedKeys();
      const [apiKeys, setApiKeys] = useState({ anthropicKey: saved.anthropicKey, hubspotToken: saved.hubspotToken });
      const [setupDone, setSetupDone] = useState(Boolean(saved.anthropicKey && saved.hubspotToken));
      const [setupAnthropicKey, setSetupAnthropicKey] = useState(saved.anthropicKey);
      const [setupHubspotToken, setSetupHubspotToken] = useState(saved.hubspotToken);

      const [step, setStep] = useState("upload");
      const [file, setFile] = useState(null);
      const [fileData, setFileData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState("");
      const [analysis, setAnalysis] = useState(null);
      const [pricingModel, setPricingModel] = useState(null);
      const [targetMargin, setTargetMargin] = useState(0.005);
      const [proposal, setProposal] = useState(null);
      const [dragOver, setDragOver] = useState(false);
      const [dealUrl, setDealUrl] = useState("");
      const [pushStatus, setPushStatus] = useState(null); // null | "success" | "error"
      const fileRef = useRef();

      const handleSetup = () => {
        if (!setupAnthropicKey.trim() || !setupHubspotToken.trim()) {
          alert("Please enter both API keys.");
          return;
        }
        saveKeys(setupAnthropicKey.trim(), setupHubspotToken.trim());
        setApiKeys({ anthropicKey: setupAnthropicKey.trim(), hubspotToken: setupHubspotToken.trim() });
        setSetupDone(true);
      };

      // ── File Handling ──
      const handleFile = (f) => {
        setFile(f);
        const reader = new FileReader();
        reader.onload = (e) => setFileData(e.target.result.split(",")[1]);
        reader.readAsDataURL(f);
      };

      const onDrop = (e) => {
        e.preventDefault();
        setDragOver(false);
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
      };

      // ── Step 1: Analyze Statement ──
      const analyzeStatement = async () => {
        if (!fileData) return;
        setLoading(true);
        setLoadingMsg("Analyzing your statement with AI...");

        const isImage = file.type.startsWith("image/");
        const mediaType = isImage ? file.type : "application/pdf";

        const userContent = [
          {
            type: isImage ? "image" : "document",
            source: { type: "base64", media_type: mediaType, data: fileData },
          },
          {
            type: "text",
            text: `You are an expert payment processing analyst. Analyze this merchant statement and extract ALL financial data possible. Return ONLY a JSON object (no markdown, no explanation) with this exact structure:

{
  "merchantName": "string or Unknown",
  "processingMonth": "string or Unknown",
  "totalVolume": number (total $ processed),
  "totalTransactions": number,
  "totalFees": number (all fees paid),
  "interchangeFees": number (interchange costs only, estimate if not broken out),
  "processorFees": number (assessment + processor markup fees),
  "otherFees": number (monthly fees, PCI, etc.),
  "effectiveRate": number (totalFees/totalVolume as decimal e.g. 0.0245),
  "interchangeRate": number (interchangeFees/totalVolume as decimal),
  "processorMarkup": number (processorFees/totalVolume as decimal),
  "averageTicket": number,
  "cardPresentVolume": number (estimate if not stated),
  "cardNotPresentVolume": number (estimate if not stated),
  "cardPresentPct": number (decimal),
  "cardNotPresentPct": number (decimal),
  "visaVolume": number,
  "mastercardVolume": number,
  "amexVolume": number,
  "discoverVolume": number,
  "rewardCardPct": number (estimate, decimal),
  "corporateCardPct": number (estimate, decimal),
  "qualifiedRate": number (if tiered pricing, else null),
  "midQualifiedRate": number (if tiered, else null),
  "nonQualifiedRate": number (if tiered, else null),
  "currentPricingModel": "tiered|interchange-plus|flat-rate|unknown",
  "currentProcessorName": "string",
  "annualVolume": number (monthly * 12 estimate),
  "confidence": "high|medium|low",
  "notes": "any important observations"
}

If you cannot find exact values, make educated estimates based on industry averages and mark confidence as low or medium. Never return null for numeric fields - use 0 if truly unknown.`,
          },
        ];

        try {
          const data = await callAnthropic(apiKeys.anthropicKey, {
            model: "claude-3-5-haiku-20241022",
            max_tokens: 1000,
            messages: [{ role: "user", content: userContent }],
          });

          const text = data.content?.map((b) => b.text || "").join("") || "";
          const parsed = parseAIAnalysis(text);

          if (parsed) {
            parsed.currentMargin = (parsed.effectiveRate || 0) - (parsed.interchangeRate || 0);
            setAnalysis(parsed);
            setStep("analysis");
          } else {
            alert("Could not parse statement. Please try a clearer PDF or image.");
          }
        } catch (err) {
          alert("Error analyzing statement: " + err.message);
        }
        setLoading(false);
      };

      // ── Step 3: Generate Proposal ──
      const generateProposal = async () => {
        if (!analysis || !pricingModel) return;
        setLoading(true);
        setLoadingMsg("Generating your proposal...");

        const prompt = `You are a payment processing sales expert. Generate a detailed pricing proposal.

MERCHANT DATA:
${JSON.stringify(analysis, null, 2)}

SELECTED PRICING MODEL: ${pricingModel}
TARGET MARGIN (above interchange): ${(targetMargin * 100).toFixed(3)}%

Return ONLY a JSON object (no markdown):
{
  "pricingModel": "${pricingModel}",
  "proposedRates": {
    ${pricingModel === "2-tier" ? `
    "cardPresentRate": number (interchange avg for CP + targetMargin, as decimal),
    "cardPresentPerTxn": number (per transaction fee, e.g. 0.10),
    "cardNotPresentRate": number (interchange avg for CNP + targetMargin + risk premium, as decimal),
    "cardNotPresentPerTxn": number
    ` : pricingModel === "interchange-plus" ? `
    "basisPoints": number (targetMargin in basis points above interchange, e.g. 25),
    "perTransaction": number (per txn fee, e.g. 0.10),
    "monthlyFee": number
    ` : `
    "flatRate": number (single rate covering interchange + margin, as decimal),
    "perTransaction": number
    `}
  },
  "projectedFees": {
    "monthly": number,
    "annual": number,
    "effectiveRate": number (as decimal)
  },
  "currentFees": {
    "monthly": number,
    "annual": number,
    "effectiveRate": number
  },
  "savings": {
    "monthly": number,
    "annual": number,
    "savingsPct": number (decimal, how much % cheaper)
  },
  "myRevenue": {
    "monthly": number (my margin above interchange),
    "annual": number,
    "arr": number
  },
  "sellingPoints": ["string", "string", "string", "string"],
  "proposalSummary": "2-3 sentence compelling summary for merchant",
  "breakdownTable": [
    {"category": "string", "current": number, "proposed": number, "savings": number}
  ]
}

Be precise with calculations. The ARR (my revenue) should equal: targetMargin * annualVolume + (perTxn * annualTransactions). Savings = current fees - proposed fees.`;

        try {
          const data = await callAnthropic(apiKeys.anthropicKey, {
            model: "claude-3-5-haiku-20241022",
            max_tokens: 1000,
            messages: [{ role: "user", content: prompt }],
          });

          const text = data.content?.map((b) => b.text || "").join("") || "";
          const parsed = parseAIAnalysis(text);
          if (parsed) {
            setProposal(parsed);
            setStep("proposal");
          } else {
            alert("Could not generate proposal. Please try again.");
          }
        } catch (err) {
          alert("Error: " + err.message);
        }
        setLoading(false);
      };

      // ── Push to HubSpot ──
      const handlePushToHubSpot = async () => {
        const dealId = extractDealId(dealUrl);
        if (!dealId) {
          alert("Please paste a valid HubSpot deal URL (e.g. https://app-na2.hubspot.com/contacts/.../deal/12345)");
          return;
        }
        setLoading(true);
        setLoadingMsg("Pushing proposal to HubSpot...");
        setPushStatus(null);
        try {
          const noteHtml = buildNoteHtml(analysis, proposal, pricingModel, targetMargin);
          await pushNoteToHubSpot(apiKeys.hubspotToken, dealId, noteHtml);
          setPushStatus("success");
          setLoading(false);
          // Auto-reset after 3 seconds
          setTimeout(() => {
            setStep("upload");
            setFile(null);
            setFileData(null);
            setAnalysis(null);
            setProposal(null);
            setPricingModel(null);
            setDealUrl("");
            setPushStatus(null);
          }, 3000);
        } catch (err) {
          setLoading(false);
          setPushStatus("error");
          alert("Failed to push to HubSpot: " + err.message);
        }
      };

      // ─────────────────────────────────────────────────────────────────────────────
      // RENDER
      // ─────────────────────────────────────────────────────────────────────────────
      // ── Password Gate ──
      if (!authed) {
        return (
          <div style={styles.root}>
            <style>{css}</style>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 24 }}>
              <div style={{ background: T.card, border: `1px solid ${T.cardBorder}`, borderRadius: 16, padding: "48px 40px", maxWidth: 420, width: "100%", textAlign: "center" }}>
                <div style={{ fontSize: 32, marginBottom: 8 }}>{"\u25C8"}</div>
                <h1 style={{ ...styles.h1, textAlign: "center", marginBottom: 4 }}>ClearRate</h1>
                <p style={{ color: T.muted, fontSize: 13, letterSpacing: 2, textTransform: "uppercase", marginBottom: 32 }}>Proposal Engine</p>
                <div style={{ textAlign: "left", marginBottom: 20 }}>
                  <label style={{ fontSize: 11, color: T.muted, letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 8 }}>
                    Password
                  </label>
                  <input
                    type="password"
                    value={passInput}
                    onChange={(e) => { setPassInput(e.target.value); setPassError(false); }}
                    onKeyDown={(e) => e.key === "Enter" && handleLogin()}
                    placeholder="Enter access password"
                    autoFocus
                    style={{
                      width: "100%", padding: "12px 16px", background: T.bg,
                      border: `1px solid ${passError ? "#ef4444" : T.cardBorder}`, borderRadius: 8, color: T.white,
                      fontFamily: "inherit", fontSize: 14, outline: "none",
                    }}
                  />
                  {passError && <p style={{ color: "#ef4444", fontSize: 12, marginTop: 6 }}>Incorrect password. Please try again.</p>}
                </div>
                <button
                  style={{ ...styles.btn, ...styles.btnPrimary, width: "100%", opacity: passInput.trim() ? 1 : 0.4 }}
                  onClick={handleLogin}
                >
                  Access App {"\u2192"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ── Setup Screen ──
      if (!setupDone) {
        return (
          <div style={styles.root}>
            <style>{css}</style>
            <header style={styles.header}>
              <div style={styles.headerInner}>
                <div style={styles.logo}>
                  <span style={styles.logoMark}>{"\u25C8"}</span>
                  <span style={styles.logoText}>ClearRate</span>
                  <span style={styles.logoSub}>Proposal Engine</span>
                </div>
              </div>
            </header>
            <main style={styles.main}>
              <div style={styles.panel}>
                <h1 style={styles.h1}>API Key Setup</h1>
                <p style={styles.sub}>Enter your API keys below. They are saved in your browser only and never sent anywhere except the respective APIs.</p>

                <div style={{ marginBottom: 24 }}>
                  <label style={{ fontSize: 11, color: T.muted, letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 8 }}>
                    Anthropic API Key
                  </label>
                  <input
                    type="password"
                    value={setupAnthropicKey}
                    onChange={(e) => setSetupAnthropicKey(e.target.value)}
                    placeholder="sk-ant-api03-..."
                    style={{
                      width: "100%", padding: "12px 16px", background: T.bg,
                      border: `1px solid ${T.cardBorder}`, borderRadius: 8, color: T.white,
                      fontFamily: "inherit", fontSize: 14, outline: "none",
                    }}
                  />
                  <p style={{ fontSize: 12, color: T.muted, marginTop: 6 }}>Get this from console.anthropic.com {"\u2192"} API Keys</p>
                </div>

                <div style={{ marginBottom: 32 }}>
                  <label style={{ fontSize: 11, color: T.muted, letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 8 }}>
                    HubSpot Private App Token
                  </label>
                  <input
                    type="password"
                    value={setupHubspotToken}
                    onChange={(e) => setSetupHubspotToken(e.target.value)}
                    placeholder="pat-na2-..."
                    style={{
                      width: "100%", padding: "12px 16px", background: T.bg,
                      border: `1px solid ${T.cardBorder}`, borderRadius: 8, color: T.white,
                      fontFamily: "inherit", fontSize: 14, outline: "none",
                    }}
                  />
                  <p style={{ fontSize: 12, color: T.muted, marginTop: 6 }}>Get this from HubSpot {"\u2192"} Settings {"\u2192"} Integrations {"\u2192"} Private Apps</p>
                </div>

                <button style={{ ...styles.btn, ...styles.btnPrimary, opacity: (setupAnthropicKey.trim() && setupHubspotToken.trim()) ? 1 : 0.4 }} onClick={handleSetup}>
                  Save & Continue {"\u2192"}
                </button>
              </div>
            </main>
          </div>
        );
      }

      return (
        <div style={styles.root}>
          <style>{css}</style>

          {/* Header */}
          <header style={styles.header}>
            <div style={styles.headerInner}>
              <div style={styles.logo}>
                <span style={styles.logoMark}>{"\u25C8"}</span>
                <span style={styles.logoText}>ClearRate</span>
                <span style={styles.logoSub}>Proposal Engine</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <nav style={styles.steps}>
                  {[
                    { id: "upload", label: "01 Upload" },
                    { id: "analysis", label: "02 Analysis" },
                    { id: "pricing", label: "03 Pricing" },
                    { id: "proposal", label: "04 Proposal" },
                  ].map((s) => (
                    <div
                      key={s.id}
                      style={{
                        ...styles.stepItem,
                        ...(step === s.id ? styles.stepActive : {}),
                        ...(STEPS.indexOf(step) > STEPS.indexOf(s.id) ? styles.stepDone : {}),
                      }}
                    >
                      {s.label}
                    </div>
                  ))}
                </nav>
                <button
                  style={{ background: "transparent", border: `1px solid ${T.cardBorder}`, borderRadius: 4, padding: "4px 10px", color: T.muted, fontSize: 11, cursor: "pointer", letterSpacing: 1 }}
                  onClick={() => setSetupDone(false)}
                >
                  {"\u2699"} Keys
                </button>
              </div>
            </div>
          </header>

          <main style={styles.main}>
            {/* ── LOADING OVERLAY ── */}
            {loading && (
              <div style={styles.loadingOverlay}>
                <div style={styles.loadingCard}>
                  <div style={styles.spinner} className="spin" />
                  <p style={styles.loadingText}>{loadingMsg}</p>
                </div>
              </div>
            )}

            {/* ══ STEP 1: UPLOAD ══ */}
            {step === "upload" && (
              <div style={styles.panel}>
                <h1 style={styles.h1}>Upload Merchant Statement</h1>
                <p style={styles.sub}>Upload a PDF or image of any merchant processing statement. Our AI will extract all fee data automatically.</p>

                <div
                  style={{ ...styles.dropzone, ...(dragOver ? styles.dropzoneActive : {}), ...(file ? styles.dropzoneDone : {}) }}
                  onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                  onDragLeave={() => setDragOver(false)}
                  onDrop={onDrop}
                  onClick={() => fileRef.current.click()}
                >
                  <input ref={fileRef} type="file" accept=".pdf,image/*" style={{ display: "none" }} onChange={(e) => e.target.files[0] && handleFile(e.target.files[0])} />
                  {file ? (
                    <>
                      <div style={styles.fileIcon}>{"\u2713"}</div>
                      <p style={styles.fileName}>{file.name}</p>
                      <p style={styles.fileMeta}>{(file.size / 1024).toFixed(1)} KB {"\u2022"} Click to replace</p>
                    </>
                  ) : (
                    <>
                      <div style={styles.uploadIcon}>{"\u2B06"}</div>
                      <p style={styles.dropLabel}>Drop statement here or click to browse</p>
                      <p style={styles.dropMeta}>PDF or image {"\u2022"} Any processor format accepted</p>
                    </>
                  )}
                </div>

                <div style={styles.supportedGrid}>
                  {["Stripe", "Square", "First Data", "TSYS", "Heartland", "Worldpay", "Chase Paymentech", "Elavon"].map((p) => (
                    <div key={p} style={styles.processorChip}>{p}</div>
                  ))}
                </div>

                <button style={{ ...styles.btn, ...styles.btnPrimary, opacity: file ? 1 : 0.4 }} disabled={!file || loading} onClick={analyzeStatement}>
                  Analyze Statement {"\u2192"}
                </button>
              </div>
            )}

            {/* ══ STEP 2: ANALYSIS ══ */}
            {step === "analysis" && analysis && (

                  </div>
                  <div style={styles.badge}>Current: {analysis.currentPricingModel?.replace("-", " ").toUpperCase()}</div>
                </div>

                {/* Key Metrics */}
                <div style={styles.metricsGrid}>
                  {[
                    { label: "Monthly Volume", value: formatCurrency(analysis.totalVolume), accent: false },
                    { label: "Total Fees Paid", value: formatCurrency(analysis.totalFees), accent: true },
                    { label: "Effective Rate", value: formatPct2(analysis.effectiveRate), accent: true },
                    { label: "Avg Ticket", value: formatCurrency(analysis.averageTicket), accent: false },
                  ].map((m) => (
                    <div key={m.label} style={{ ...styles.metricCard, ...(m.accent ? styles.metricCardAccent : {}) }}>
                      <div style={styles.metricValue}>{m.value}</div>
                      <div style={styles.metricLabel}>{m.label}</div>

                {/* Fee Breakdown */}

                      { name: "Processor Markup", amount: analysis.processorFees, rate: analysis.processorMarkup, note: "This is where savings are found" },
                      { name: "Other Fees", amount: analysis.otherFees, rate: analysis.otherFees / analysis.totalVolume, note: "Monthly, PCI, misc." },
                    ].map((row) => (
                      <div key={row.name} style={styles.feeRow}>
                        <div style={styles.feeName}>
                          <span>{row.name}</span>
                          <span style={styles.feeNote}>{row.note}</span>
                        </div>
                        <div style={styles.feeAmount}>{formatCurrency(row.amount)}</div>
                        <div style={styles.feeRate}>{formatPct(row.rate || 0)}</div>
                        <div style={styles.feeBar}>
                          <div style={{ ...styles.feeBarFill, width: `${Math.min(((row.amount || 0) / (analysis.totalFees || 1)) * 100, 100)}%`, background: row.name.includes("Interchange") ? "#3b82f6" : row.name.includes("Processor") ? "#f97316" : "#6b7280" }} />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Margin Above Interchange */}
                <div style={styles.highlightBox}>
                  <div style={styles.highlightLeft}>
                    <div style={styles.highlightTitle}>Current Margin Above Interchange</div>
                    <div style={styles.highlightValue}>{formatPct2(analysis.currentMargin)}</div>
                    <div style={styles.highlightSub}>This is what your current processor earns on top of interchange costs</div>
                  </div>
                  <div style={styles.highlightRight}>
                    <div style={styles.hlStat}><span style={styles.hlStatNum}>{formatCurrency(analysis.processorFees)}</span><span style={styles.hlStatLabel}>Monthly Processor Revenue</span></div>
                    <div style={styles.hlStat}><span style={styles.hlStatNum}>{formatCurrency((analysis.processorFees || 0) * 12)}</span><span style={styles.hlStatLabel}>Annual Processor Revenue</span></div>
                  </div>
                </div>

                {/* Volume Mix */}
                <div style={styles.section}>
                  <h2 style={styles.h2}>Volume Mix</h2>
                  <div style={styles.mixGrid}>
                    <div style={styles.mixCard}>
                      <div style={styles.mixLabel}>Card Present</div>
                      <div style={styles.mixPct}>{formatPct2(analysis.cardPresentPct || 0)}</div>
                      <div style={styles.mixAmt}>{formatCurrency(analysis.cardPresentVolume)}</div>
                    </div>
                    <div style={styles.mixCard}>
                      <div style={styles.mixLabel}>Card Not Present</div>
                      <div style={styles.mixPct}>{formatPct2(analysis.cardNotPresentPct || 0)}</div>
                      <div style={styles.mixAmt}>{formatCurrency(analysis.cardNotPresentVolume)}</div>
                    </div>
                    <div style={styles.mixCard}>
                      <div style={styles.mixLabel}>Reward Cards</div>
                      <div style={styles.mixPct}>{formatPct2(analysis.rewardCardPct || 0)}</div>
                      <div style={styles.mixAmt}>{formatCurrency((analysis.totalVolume || 0) * (analysis.rewardCardPct || 0))}</div>
                    </div>
                    <div style={styles.mixCard}>
                      <div style={styles.mixLabel}>Corporate Cards</div>
                      <div style={styles.mixPct}>{formatPct2(analysis.corporateCardPct || 0)}</div>
                      <div style={styles.mixAmt}>{formatCurrency((analysis.totalVolume || 0) * (analysis.corporateCardPct || 0))}</div>
                    </div>
                  </div>
                </div>

                {analysis.notes && (
                  <div style={styles.notesBox}>
                    <strong>AI Notes:</strong> {analysis.notes}
                  </div>
                )}

                <div style={styles.btnRow}>
                  <button style={{ ...styles.btn, ...styles.btnSecondary }} onClick={() => setStep("upload")}>{"\u2190"} Re-upload</button>
                  <button style={{ ...styles.btn, ...styles.btnPrimary }} onClick={() => setStep("pricing")}>Select Pricing Model {"\u2192"}</button>
                </div>
              </div>
            )}

            {/* ══ STEP 3: PRICING ══ */}
            {step === "pricing" && analysis && (
              <div style={styles.panel}>
                <h1 style={styles.h1}>Configure Your Proposal</h1>
                <p style={styles.sub}>Select a pricing model and set your target margin above interchange to build the proposal.</p>

                <div style={styles.section}>
                  <h2 style={styles.h2}>Pricing Model</h2>
                  <div style={styles.modelGrid}>
                    {[
                      {
                        id: "2-tier",
                        name: "2-Tier Pricing",
                        icon: "\u2B1B",
                        desc: "Separate rates for card-present and card-not-present transactions. Simple to explain, easy for merchants to budget.",
                        pros: ["Simple for merchants to understand", "Predictable monthly costs", "Good for high CP volume"],
                        cons: ["Less transparent", "May not suit mixed environments"],
                      },
                      {
                        id: "interchange-plus",
                        name: "Interchange Plus",
                        icon: "\u25CE",
                        desc: "Transparent interchange cost pass-through plus a fixed markup. Industry gold standard for transparency.",
                        pros: ["Fully transparent", "Merchant sees exact costs", "Lower effective rate"],
                        cons: ["Variable monthly bills", "More complex to explain"],
                      },
                      {
                        id: "flat-rate",
                        name: "Flat Rate",
                        icon: "\u25AC",
                        desc: "One simple rate for all card types. Easy to understand and predict, ideal for low-volume merchants.",
                        pros: ["Simplest possible billing", "Easy to budget", "No surprises"],
                        cons: ["May overpay on debit/low-reward", "Less competitive at scale"],
                      },
                    ].map((m) => (
                      <div

                        <div style={styles.modelDesc}>{m.desc}</div>
                        <div style={styles.prosList}>
                          {m.pros.map((p) => <div key={p} style={styles.pro}>{"\u2713"} {p}</div>)}
                          {m.cons.map((c) => <div key={c} style={styles.con}>{"\u2013"} {c}</div>)}
                        </div>
                        {pricingModel === m.id && <div style={styles.selectedBadge}>Selected</div>}

                    <div style={styles.marginPreview}>

                        <span style={styles.mpLabel}>Est. Monthly Revenue</span>

                      <div style={styles.mpItem}>

                      <div style={styles.mpItem}>
                        <span style={styles.mpLabel}>vs. Current Margin</span>

                          {targetMargin < (analysis.currentMargin || 0.015) ? "\u25BC " : "\u25B2 "}{formatPct2(Math.abs(targetMargin - (analysis.currentMargin || 0.015)))} {targetMargin < (analysis.currentMargin || 0.015) ? "lower than current" : "higher than current"}

                      </div>
                    </div>
                  </div>
                </div>

                  <button style={{ ...styles.btn, ...styles.btnSecondary }} onClick={() => setStep("analysis")}>{"\u2190"} Back to Analysis</button>

            {/* ══ STEP 4: PROPOSAL ══ */}
            {step === "proposal" && proposal && analysis && (

                <div style={styles.proposalHeader}>
                  <div style={styles.proposalBadge}>MERCHANT PROPOSAL</div>

                  <p style={styles.proposalSub}>{proposal.proposalSummary}</p>
                </div>

                {/* Savings Hero */}
                <div style={styles.savingsHero}>
                  <div style={styles.savingsMain}>
                    <div style={styles.savingsLabel}>Annual Savings for Merchant</div>
                    <div style={styles.savingsAmount}>{formatCurrency(proposal.savings?.annual || 0)}</div>
                    <div style={styles.savingsPct}>{formatPct2(proposal.savings?.savingsPct || 0)} reduction in processing costs</div>
                  </div>
                  <div style={styles.savingsSide}>
                    <div style={styles.ssItem}>
                      <div style={styles.ssVal}>{formatCurrency(proposal.savings?.monthly || 0)}</div>
                      <div style={styles.ssLbl}>Monthly Savings</div>
                    </div>
                    <div style={styles.ssDivider} />
                    <div style={styles.ssItem}>
                      <div style={styles.ssVal}>{formatPct2(proposal.projectedFees?.effectiveRate || 0)}</div>
                      <div style={styles.ssLbl}>New Effective Rate</div>
                    </div>
                    <div style={styles.ssDivider} />
                    <div style={styles.ssItem}>
                      <div style={styles.ssVal}>{formatPct2(proposal.currentFees?.effectiveRate || analysis.effectiveRate || 0)}</div>
                      <div style={styles.ssLbl}>Current Effective Rate</div>
                    </div>
                  </div>
                </div>

                {/* Proposed Rates */}
                <div style={styles.section}>
                  <h2 style={styles.h2}>Proposed {proposal.pricingModel === "2-tier" ? "2-Tier" : proposal.pricingModel === "interchange-plus" ? "Interchange Plus" : "Flat Rate"} Pricing</h2>
                  <div style={styles.ratesGrid}>
                    {proposal.pricingModel === "2-tier" && (
                      <>
                        <div style={styles.rateCard}>
                          <div style={styles.rateLabel}>Card Present</div>
                          <div style={styles.rateValue}>{formatPct2(proposal.proposedRates?.cardPresentRate || 0)}</div>
                          <div style={styles.rateSub}>+ ${(proposal.proposedRates?.cardPresentPerTxn || 0).toFixed(2)} per transaction</div>
                        </div>
                        <div style={styles.rateCard}>
                          <div style={styles.rateLabel}>Card Not Present</div>
                          <div style={styles.rateValue}>{formatPct2(proposal.proposedRates?.cardNotPresentRate || 0)}</div>
                          <div style={styles.rateSub}>+ ${(proposal.proposedRates?.cardNotPresentPerTxn || 0).toFixed(2)} per transaction</div>
                        </div>
                      </>
                    )}
                    {proposal.pricingModel === "interchange-plus" && (
                      <>
                        <div style={styles.rateCard}>
                          <div style={styles.rateLabel}>Markup</div>
                          <div style={styles.rateValue}>{proposal.proposedRates?.basisPoints || 0} BPS</div>
                          <div style={styles.rateSub}>above interchange pass-through</div>
                        </div>
                        <div style={styles.rateCard}>
                          <div style={styles.rateLabel}>Per Transaction</div>
                          <div style={styles.rateValue}>${(proposal.proposedRates?.perTransaction || 0).toFixed(2)}</div>
                          <div style={styles.rateSub}>flat authorization fee</div>
                        </div>
                        {proposal.proposedRates?.monthlyFee > 0 && (
                          <div style={styles.rateCard}>
                            <div style={styles.rateLabel}>Monthly Fee</div>
                            <div style={styles.rateValue}>{formatCurrency(proposal.proposedRates?.monthlyFee)}</div>
                            <div style={styles.rateSub}>platform & service fee</div>
                          </div>
                        )}
                      </>
                    )}
                    {proposal.pricingModel === "flat-rate" && (
                      <>
                        <div style={styles.rateCard}>
                          <div style={styles.rateLabel}>All Card Types</div>
                          <div style={styles.rateValue}>{formatPct2(proposal.proposedRates?.flatRate || 0)}</div>
                          <div style={styles.rateSub}>single flat rate, all cards</div>
                        </div>
                        <div style={styles.rateCard}>
                          <div style={styles.rateLabel}>Per Transaction</div>
                          <div style={styles.rateValue}>${(proposal.proposedRates?.perTransaction || 0).toFixed(2)}</div>
                          <div style={styles.rateSub}>flat authorization fee</div>
                        </div>
                      </>
                    )}
                  </div>
                </div>

                {/* Fee Comparison Table */}
                <div style={styles.section}>
                  <h2 style={styles.h2}>Fee Comparison</h2>
                  <div style={styles.compareTable}>
                    <div style={styles.compareHeader}>
                      <div style={styles.compareCell}>Category</div>
                      <div style={styles.compareCell}>Current</div>
                      <div style={styles.compareCell}>Proposed</div>
                      <div style={{ ...styles.compareCell, color: "#22c55e" }}>Savings</div>
                    </div>
                    {(proposal.breakdownTable || [
                      { category: "Monthly Processing Fees", current: analysis.totalFees, proposed: proposal.projectedFees?.monthly, savings: proposal.savings?.monthly },
                      { category: "Annual Fees", current: analysis.totalFees * 12, proposed: proposal.projectedFees?.annual, savings: proposal.savings?.annual },
                    ]).map((row, i) => (
                      <div key={i} style={{ ...styles.compareRow, ...(i % 2 === 0 ? styles.compareRowAlt : {}) }}>
                        <div style={styles.compareCell}>{row.category}</div>
                        <div style={{ ...styles.compareCell, color: "#ef4444" }}>{formatCurrency(row.current)}</div>
                        <div style={{ ...styles.compareCell, color: "#3b82f6" }}>{formatCurrency(row.proposed)}</div>
                        <div style={{ ...styles.compareCell, color: "#22c55e", fontWeight: 700 }}>{formatCurrency(row.savings)}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* My Revenue / ARR */}
                <div style={styles.arrBox}>
                  <h2 style={{ ...styles.h2, color: "#f8fafc" }}>Your Revenue {"\u2014"} This Account</h2>
                  <div style={styles.arrGrid}>
                    <div style={styles.arrItem}>
                      <div style={styles.arrVal}>{formatCurrency(proposal.myRevenue?.monthly || 0)}</div>
                      <div style={styles.arrLbl}>Monthly Revenue</div>
                    </div>
                    <div style={styles.arrItem}>
                      <div style={styles.arrVal}>{formatCurrency(proposal.myRevenue?.annual || 0)}</div>
                      <div style={styles.arrLbl}>Annual Revenue</div>
                    </div>
                    <div style={{ ...styles.arrItem, ...styles.arrHighlight }}>
                      <div style={{ ...styles.arrVal, fontSize: "2rem" }}>{formatCurrency(proposal.myRevenue?.arr || 0)}</div>
                      <div style={styles.arrLbl}>ARR (Annual Recurring Revenue)</div>
                    </div>
                  </div>
                  <div style={styles.arrNote}>Based on {formatPct2(targetMargin)} target margin on {formatCurrency(analysis.annualVolume || analysis.totalVolume * 12)} annual volume</div>
                </div>

                {/* Selling Points */}
                {proposal.sellingPoints?.length > 0 && (
                  <div style={styles.section}>
                    <h2 style={styles.h2}>Key Value Points</h2>
                    <div style={styles.vpGrid}>
                      {proposal.sellingPoints.map((p, i) => (
                        <div key={i} style={styles.vpCard}>
                          <span style={styles.vpNum}>{String(i + 1).padStart(2, "0")}</span>
                          <span style={styles.vpText}>{p}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Push to HubSpot */}
                <div style={styles.section}>
                  <h2 style={styles.h2}>Push to HubSpot</h2>
                  {pushStatus === "success" ? (
                    <div style={{ ...styles.notesBox, background: "#22c55e15", border: "1px solid #22c55e40", color: "#22c55e" }}>
                      <strong>{"\u2713"} Proposal pushed to HubSpot successfully!</strong> Resetting form...
                    </div>
                  ) : (
                    <div style={{ display: "flex", gap: 12, alignItems: "flex-end", flexWrap: "wrap" }}>
                      <div style={{ flex: 1, minWidth: 300 }}>
                        <label style={{ fontSize: 11, color: T.muted, letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 8 }}>
                          HubSpot Deal URL
                        </label>
                        <input
                          type="text"
                          value={dealUrl}
                          onChange={(e) => setDealUrl(e.target.value)}
                          placeholder="https://app-na2.hubspot.com/contacts/.../deal/12345"
                          style={{
                            width: "100%", padding: "12px 16px", background: T.bg,
                            border: `1px solid ${T.cardBorder}`, borderRadius: 8, color: T.white,
                            fontFamily: "inherit", fontSize: 14, outline: "none",

                        />
                      </div>
                      <button
                        style={{ ...styles.btn, background: "#f97316", color: "#fff", opacity: dealUrl.trim() ? 1 : 0.4, whiteSpace: "nowrap" }}
                        disabled={!dealUrl.trim() || loading}
                        onClick={handlePushToHubSpot}
                      >
                        Push to HubSpot {"\u2192"}
                      </button>
                    </div>
                  )}
                </div>

                <div style={styles.btnRow}>
                  <button style={{ ...styles.btn, ...styles.btnSecondary }} onClick={() => setStep("pricing")}>{"\u2190"} Adjust Pricing</button>
                  <button style={{ ...styles.btn, ...styles.btnPrimary }} onClick={() => window.print()}>Print / Export Proposal</button>
                  <button style={{ ...styles.btn, ...styles.btnGhost }} onClick={() => { setStep("upload"); setFile(null); setFileData(null); setAnalysis(null); setProposal(null); setPricingModel(null); setDealUrl(""); setPushStatus(null); }}>
                    New Proposal
                  </button>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }
