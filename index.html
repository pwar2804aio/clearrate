<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClearRate Proposal Engine</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f1e; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- API key config — loaded from localStorage -->
  <script>
    (function() {
      var saved = localStorage.getItem("cr_api_key");
      if (saved) { window.__CR_API_KEY = saved; }
    })();
  </script>

  <script type="text/babel" data-type="module">
    const { useState, useRef, useEffect } = React;


const STEPS = ["upload", "analysis", "pricing", "proposal"];

const fmt$ = (n) => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 }).format(n || 0);
const fmtPct  = (n) => `${((n || 0) * 100).toFixed(4)}%`;
const fmtPct2 = (n) => `${((n || 0) * 100).toFixed(2)}%`;
const fmtBps  = (n) => `${Math.round((n || 0) * 10000)} bps`;

function parseJSON(text) {
  try {
    const clean = text.replace(/```json|```/g, "").trim();
    const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
    if (s !== -1 && e !== -1) return JSON.parse(clean.slice(s, e + 1));
  } catch {}
  return null;
}

function calcAdyenCost(tier, volume, txnCount) {
  if (!tier) return 0;
  return volume * (tier.processingBps || 0) + txnCount * (tier.perTxnFee || 0) + volume * (tier.schemeBps || 0) + (tier.monthlyFee || 0);
}

function adyenRateOnVolume(tier, volume, txnCount) {
  if (!tier || !volume) return 0;
  return calcAdyenCost(tier, volume, txnCount) / volume;
}

// ─── Default empty state ──────────────────────────────────────────────────────
const defaultSettings = {
  processors: [],
  activeProcessorId: null,
};

const newProcessor = () => ({
  id: Date.now().toString(),
  name: "New Processor",
  contractFile: null,
  rates: null,
  activeTierId: null,
  createdAt: new Date().toISOString(),
});

// ─── Storage helpers ──────────────────────────────────────────────────────────
async function loadSettings() {
  try {
    const raw = localStorage.getItem("clearrate:settings"); const r = raw ? { value: raw } : null;
    return r ? JSON.parse(r.value) : defaultSettings;
  } catch { return defaultSettings; }
}

async function saveSettings(s) {
  try { localStorage.setItem("clearrate:settings", JSON.stringify(s)); } catch {}
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("proposal"); // "proposal" | "settings"
  const [settings, setSettings] = useState(null);
  const [settingsLoaded, setSettingsLoaded] = useState(false);
  // Proposal flow
  const [step, setStep] = useState("upload");
  const [file, setFile] = useState(null);
  const [fileData, setFileData] = useState(null);
  const [analysis, setAnalysis] = useState(null);
  const [pricingModel, setPricingModel] = useState(null);
  const [targetMargin, setTargetMargin] = useState(0.005);
  const [proposal, setProposal] = useState(null);
  const [feeOverrides, setFeeOverrides] = useState({ monthlyFee: 0, perTxnFee: 0, cpPerTxnFee: 0, cnpPerTxnFee: 0 });
  const [dragOver, setDragOver] = useState(false);
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState("");
  const fileRef = useRef();

  // Load settings on mount
  useEffect(() => {
    loadSettings().then(s => { setSettings(s); setSettingsLoaded(true); });
  }, []);

  const persistSettings = (updated) => {
    setSettings(updated);
    saveSettings(updated);
  };

  // Active processor + tier
  const activeProcessor = settings?.processors?.find(p => p.id === settings?.activeProcessorId) || null;
  const activeTier = activeProcessor?.rates?.isTiered
    ? activeProcessor.rates.tiers?.find(t => t.id === activeProcessor.activeTierId) || activeProcessor.rates.tiers?.[0]
    : activeProcessor?.rates ? { ...activeProcessor.rates, id: "flat", label: "Standard Rate" } : null;

  const adyenCostRate = (activeTier && analysis)
    ? adyenRateOnVolume(activeTier, analysis.totalVolume, analysis.totalTransactions)
    : 0;
  const netMargin = targetMargin - adyenCostRate;
  const belowFloor = netMargin < 0;

  const readFile = (f, cb) => {
    const r = new FileReader();
    r.onload = e => cb(e.target.result.split(",")[1]);
    r.readAsDataURL(f);
  };

  const analyzeStatement = async () => {
    if (!fileData) return;
    setLoading(true); setLoadingMsg("Analyzing merchant statement...");
    const isImage = file.type.startsWith("image/");
    try {
      const res = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://api.anthropic.com/v1/messages"), {
        method: "POST", headers: { "Content-Type": "application/json", "x-api-key": window.__CR_API_KEY || "", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content: [
            { type: isImage ? "image" : "document", source: { type: "base64", media_type: isImage ? file.type : "application/pdf", data: fileData } },
            { type: "text", text: `Analyze this merchant statement. Return ONLY JSON (no markdown):
{"merchantName":"string","processingMonth":"string","totalVolume":number,"totalTransactions":number,"totalFees":number,"interchangeFees":number,"processorFees":number,"otherFees":number,"effectiveRate":number,"interchangeRate":number,"processorMarkup":number,"averageTicket":number,"cardPresentVolume":number,"cardNotPresentVolume":number,"cardPresentPct":number,"cardNotPresentPct":number,"visaVolume":number,"mastercardVolume":number,"amexVolume":number,"discoverVolume":number,"rewardCardPct":number,"corporateCardPct":number,"currentPricingModel":"tiered|interchange-plus|flat-rate|unknown","currentProcessorName":"string","annualVolume":number,"confidence":"high|medium|low","notes":"string"}
Use 0 for unknown numerics.` }
          ]}]
        })
      });
      const data = await res.json();
      const parsed = parseJSON(data.content?.map(b => b.text || "").join("") || "");
      if (parsed) {
        // Normalize: if any rate field looks like a percentage (>0.5) convert to decimal
        const rateFields = ["effectiveRate","interchangeRate","processorMarkup","cardPresentPct","cardNotPresentPct","rewardCardPct","corporateCardPct"];
        rateFields.forEach(f => {
          if (parsed[f] != null && parsed[f] > 0.5) parsed[f] = parsed[f] / 100;
        });
        // Volume-derived pcts: recalculate from volumes if total is available
        if (parsed.totalVolume > 0) {
          if (parsed.cardPresentVolume > 0)   parsed.cardPresentPct   = parsed.cardPresentVolume   / parsed.totalVolume;
          if (parsed.cardNotPresentVolume > 0) parsed.cardNotPresentPct = parsed.cardNotPresentVolume / parsed.totalVolume;
          // Sanity-check pct fields — if still > 1 after normalization, zero them
          ["cardPresentPct","cardNotPresentPct","rewardCardPct","corporateCardPct"].forEach(f => {
            if (parsed[f] > 1) parsed[f] = 0;
          });
          // Recalculate effective rate from actual numbers as a cross-check
          if (parsed.totalFees > 0) {
            const derived = parsed.totalFees / parsed.totalVolume;
            // If AI rate is wildly off from derived, trust the derived value
            if (Math.abs((parsed.effectiveRate || 0) - derived) > 0.01) parsed.effectiveRate = derived;
          }
          // Same cross-check for interchange
          if (parsed.interchangeFees > 0) {
            const derivedIC = parsed.interchangeFees / parsed.totalVolume;
            if (Math.abs((parsed.interchangeRate || 0) - derivedIC) > 0.01) parsed.interchangeRate = derivedIC;
          }
        }
        parsed.currentMargin = (parsed.effectiveRate || 0) - (parsed.interchangeRate || 0);
        setAnalysis(parsed);
        setStep("analysis");
      }
      else alert("Could not parse statement.");
    } catch (err) { alert("Error: " + err.message); }
    setLoading(false);
  };

  const generateProposal = async () => {
    if (!analysis || !pricingModel) return;
    setLoading(true); setLoadingMsg("Building your proposal...");

    // Re-derive the exact same rates PricingStep shows, so the AI uses them verbatim
    const vol = analysis.totalVolume || 0;
    const txns = analysis.totalTransactions || 0;
    const icRate = analysis.interchangeRate || 0;

    const annVol = vol * 12; // always derive from monthly
    const cpPct  = analysis.cardPresentPct    || 0.7;
    const cnpPct = analysis.cardNotPresentPct || 0.3;
    const cpVol  = analysis.cardPresentVolume  || vol * cpPct;
    const cnpVol = analysis.cardNotPresentVolume || vol * cnpPct;
    const cpIcRate  = cpVol  > 0 ? (icRate * vol * cpPct)  / cpVol  : icRate * 0.85;
    const cnpIcRate = cnpVol > 0 ? (icRate * vol * cnpPct) / cnpVol : icRate * 1.15;

    const flatRevNeeded    = vol * targetMargin;
    const flatFeeRevenue   = txns * (feeOverrides.perTxnFee || 0) + (feeOverrides.monthlyFee || 0);
    const flatPctRevNeeded = Math.max(0, flatRevNeeded - flatFeeRevenue);
    const derivedFlatRate  = icRate + flatPctRevNeeded / (vol || 1);

    const cpRevNeeded  = cpVol  * targetMargin;
    const cnpRevNeeded = cnpVol * targetMargin;
    const cpFeeRev     = txns * cpPct  * (feeOverrides.cpPerTxnFee  || 0) + (feeOverrides.monthlyFee || 0) * cpPct;
    const cnpFeeRev    = txns * cnpPct * (feeOverrides.cnpPerTxnFee || 0) + (feeOverrides.monthlyFee || 0) * cnpPct;
    const derivedCPRate  = cpIcRate  + Math.max(0, cpRevNeeded  - cpFeeRev)  / (cpVol  || 1);
    const derivedCNPRate = cnpIcRate + Math.max(0, cnpRevNeeded - cnpFeeRev) / (cnpVol || 1);

    // Proposed monthly fees (same formula as PricingStep)
    let proposedMonthly = 0;
    if (pricingModel === "flat-rate") {
      proposedMonthly = vol * derivedFlatRate + txns * (feeOverrides.perTxnFee || 0) + (feeOverrides.monthlyFee || 0);
    } else if (pricingModel === "2-tier") {
      proposedMonthly = cpVol * derivedCPRate + txns * cpPct * (feeOverrides.cpPerTxnFee || 0)
        + cnpVol * derivedCNPRate + txns * cnpPct * (feeOverrides.cnpPerTxnFee || 0)
        + (feeOverrides.monthlyFee || 0);
    } else {
      proposedMonthly = vol * icRate + vol * targetMargin + txns * (feeOverrides.perTxnFee || 0) + (feeOverrides.monthlyFee || 0);
    }

    // Build the exact rates object to inject — AI must use these numbers, not invent its own
    const exactRates = pricingModel === "flat-rate"
      ? { flatRate: derivedFlatRate, perTransaction: feeOverrides.perTxnFee || 0, monthlyFee: feeOverrides.monthlyFee || 0 }
      : pricingModel === "2-tier"
      ? { cardPresentRate: derivedCPRate, cardPresentPerTxn: feeOverrides.cpPerTxnFee || 0, cardNotPresentRate: derivedCNPRate, cardNotPresentPerTxn: feeOverrides.cnpPerTxnFee || 0, monthlyFee: feeOverrides.monthlyFee || 0 }
      : { basisPoints: Math.round(targetMargin * 10000), perTransaction: feeOverrides.perTxnFee || 0, monthlyFee: feeOverrides.monthlyFee || 0 };

    const exactProjected = { monthly: proposedMonthly, annual: proposedMonthly * 12, effectiveRate: vol > 0 ? proposedMonthly / vol : 0 };
    const savingsMonthly = (analysis.totalFees || 0) - proposedMonthly;

    try {
      const res = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://api.anthropic.com/v1/messages"), {
        method: "POST", headers: { "Content-Type": "application/json", "x-api-key": window.__CR_API_KEY || "", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content: `Generate a payment processing proposal. Use EXACTLY the rates and fees provided — do not recalculate or change any numbers.

MERCHANT: ${JSON.stringify({       merchantName: analysis.merchantName, totalVolume: vol, totalTransactions: txns, totalFees: analysis.totalFees, effectiveRate: analysis.effectiveRate, currentProcessorName: analysis.currentProcessorName, currentPricingModel: analysis.currentPricingModel, annualVolume: annVol })}
PRICING MODEL: ${pricingModel}
PROPOSED RATES (use exactly): ${JSON.stringify(exactRates)}
PROJECTED FEES (use exactly): ${JSON.stringify(exactProjected)}
SAVINGS MONTHLY: ${savingsMonthly.toFixed(2)}
SAVINGS ANNUAL: ${(savingsMonthly * 12).toFixed(2)}

Return ONLY JSON (no markdown, all rate fields as decimals e.g. 0.0272 not 2.72):
{"pricingModel":"${pricingModel}","proposedRates":${JSON.stringify(exactRates)},"projectedFees":${JSON.stringify(exactProjected)},"currentFees":{"monthly":${(analysis.totalFees||0).toFixed(2)},"annual":${((analysis.totalFees||0)*12).toFixed(2)},"effectiveRate":${(analysis.effectiveRate||0).toFixed(6)}},"savings":{"monthly":${savingsMonthly.toFixed(2)},"annual":${(savingsMonthly*12).toFixed(2)},"savingsPct":${(analysis.totalFees > 0 ? savingsMonthly/analysis.totalFees : 0).toFixed(6)}},"sellingPoints":["string","string","string","string"],"proposalSummary":"2-3 sentence summary for the merchant"}` }]
        })
      });
      const data = await res.json();
      const parsed = parseJSON(data.content?.map(b => b.text || "").join("") || "");
      if (parsed) {
        // Force the exact computed values regardless of what AI returned
        parsed.proposedRates   = exactRates;
        parsed.projectedFees   = exactProjected;
        parsed.currentFees     = { monthly: analysis.totalFees || 0, annual: (analysis.totalFees || 0) * 12, effectiveRate: analysis.effectiveRate || 0 };
        parsed.savings         = { monthly: savingsMonthly, annual: savingsMonthly * 12, savingsPct: analysis.totalFees > 0 ? savingsMonthly / analysis.totalFees : 0 };
        setProposal(parsed);
        setStep("proposal");
      } else alert("Could not generate proposal.");
    } catch (err) { alert("Error: " + err.message); }
    setLoading(false);
  };

  if (!settingsLoaded) return (
    <div style={{...S.root, display:"flex", alignItems:"center", justifyContent:"center", minHeight:"100vh"}}>
      <div style={{textAlign:"center"}}><div style={S.spinner} className="spin"/><p style={{color:T.muted,marginTop:16}}>Loading ClearRate...</p></div>
      <style>{css}</style>
    </div>
  );

  return (
    <div style={S.root}>
      <style>{css}</style>
      <header style={S.header}>
        <div style={S.headerInner}>
          <div style={S.logo}>
            <svg width="72" height="40" viewBox="0 0 72 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              {/* A — chevron with rounded ends and curved base */}
              <path d="M4 34 L14 6 L24 34" stroke="#f9674e" strokeWidth="5.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
              <path d="M4 34 Q14 28 24 34" stroke="#f9674e" strokeWidth="5.5" strokeLinecap="round" fill="none"/>
              {/* i — rounded pill stem */}
              <rect x="29.5" y="14" width="5" height="20" rx="2.5" fill="#f9674e"/>
              {/* i — circle dot */}
              <circle cx="32" cy="7" r="3.5" fill="#f9674e"/>
              {/* o — rounded rectangle outline */}
              <rect x="39" y="13" width="29" height="21" rx="7" stroke="#f9674e" strokeWidth="5.5" fill="none"/>
            </svg>
            <span style={S.logoSub}>Proposal Engine</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:24}}>
            {page === "proposal" && (
              <nav style={S.stepNav}>
                {[{id:"upload",label:"01 Upload"},{id:"analysis",label:"02 Analysis"},{id:"pricing",label:"03 Pricing"},{id:"proposal",label:"04 Proposal"}].map(s=>(
                  <div key={s.id} style={{...S.stepItem,...(step===s.id?S.stepActive:{}),...(STEPS.indexOf(step)>STEPS.indexOf(s.id)?S.stepDone:{})}}>{s.label}</div>
                ))}
              </nav>
            )}
            <div style={S.pageNav}>
              <button style={{...S.pageBtn,...(page==="proposal"?S.pageBtnActive:{})}} onClick={()=>setPage("proposal")}>Proposals</button>
              <button style={{...S.pageBtn,...(page==="settings"?S.pageBtnActive:{})}} onClick={()=>setPage("settings")}>⚙ Settings</button>
            </div>
          </div>
        </div>
      </header>

      <main style={S.main}>
        {loading && (
          <div style={S.overlay}><div style={S.overlayCard}><div style={S.spinner} className="spin"/><p style={S.spinMsg}>{loadingMsg}</p></div></div>
        )}

        {page === "settings" && (
          <SettingsPage settings={settings} persistSettings={persistSettings} />
        )}

        {page === "proposal" && (
          <>
            {/* Active processor banner — only show outside of proposal step */}
            {step !== "proposal" && activeProcessor && activeTier && (
              <div style={S.procBanner}>
                <span style={{color:T.green}}>◈</span>
                <span style={{color:T.muted,fontSize:13}}>Acquirer:</span>
                <span style={{color:T.white,fontWeight:600,fontSize:13}}>{activeProcessor.name}</span>
                <span style={{color:T.muted,fontSize:13}}>·</span>
                <span style={{color:T.gold,fontSize:13}}>Tier: {activeTier.label || "Standard"}</span>
                <span style={{color:T.muted,fontSize:12}}>{fmtBps(activeTier.processingBps)} + ${(activeTier.perTxnFee||0).toFixed(4)}/txn</span>
                <button style={S.bannerLink} onClick={()=>setPage("settings")}>Change</button>
              </div>
            )}
            {step !== "proposal" && !activeProcessor && (
              <div style={{...S.procBanner, borderColor:`${T.gold}40`, background:`${T.gold}08`}}>
                <span style={{color:T.gold}}>⚠</span>
                <span style={{color:T.muted,fontSize:13}}>No acquirer contract loaded — proposals will not include your cost layer.</span>
                <button style={{...S.bannerLink,color:T.gold}} onClick={()=>setPage("settings")}>Add in Settings →</button>
              </div>
            )}

            {/* ══ UPLOAD ══ */}
            {step === "upload" && (
              <div style={S.panel}>
                <h1 style={S.h1}>Upload Merchant Statement</h1>
                <p style={S.sub}>Upload a PDF or image of any merchant processing statement.</p>
                <div style={{...S.dropzone,...(dragOver?S.dropzoneActive:{}),...(file?S.dropzoneDone:{})}}
                  onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
                  onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f){setFile(f);readFile(f,setFileData);}}}
                  onClick={()=>fileRef.current.click()}>
                  <input ref={fileRef} type="file" accept=".pdf,image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f){setFile(f);readFile(f,setFileData);}}}/>
                  {file?(<><div style={S.fileIcon}>✓</div><p style={S.fileName}>{file.name}</p><p style={S.fileMeta}>{(file.size/1024).toFixed(1)} KB · Click to replace</p></>)
                  :(<><div style={S.uploadIcon}>⬆</div><p style={S.dropLabel}>Drop statement here or click to browse</p><p style={S.dropMeta}>PDF or image · Any processor format</p></>)}
                </div>
                <div style={S.chips}>{["Stripe","Square","First Data","TSYS","Heartland","Worldpay","Chase Paymentech","Elavon"].map(p=><div key={p} style={S.chip}>{p}</div>)}</div>
                <button style={{...S.btn,...S.btnPrimary,opacity:file?1:0.4}} disabled={!file||loading} onClick={analyzeStatement}>Analyze Statement →</button>
              </div>
            )}

            {/* ══ ANALYSIS ══ */}
            {step === "analysis" && analysis && (
              <div style={S.panel}>
                <div style={S.panelHeader}>
                  <div><h1 style={S.h1}>{analysis.merchantName||"Merchant"} — Analysis</h1>
                    <p style={S.sub}>{analysis.processingMonth} · {analysis.currentProcessorName} · Confidence: <span style={{color:analysis.confidence==="high"?T.green:analysis.confidence==="medium"?T.gold:T.red}}>{analysis.confidence}</span></p>
                  </div>
                  <div style={S.badge}>{analysis.currentPricingModel?.replace("-"," ").toUpperCase()}</div>
                </div>
                <div style={S.grid4}>
                  {[{label:"Monthly Volume",val:fmt$(analysis.totalVolume)},{label:"Total Fees",val:fmt$(analysis.totalFees),accent:true},{label:"Effective Rate",val:fmtPct2(analysis.effectiveRate),accent:true},{label:"Avg Ticket",val:fmt$(analysis.averageTicket)}].map(m=>(
                    <div key={m.label} style={{...S.metricCard,...(m.accent?S.metricAccent:{})}}><div style={S.metricVal}>{m.val}</div><div style={S.metricLbl}>{m.label}</div></div>
                  ))}
                </div>

                <div style={S.section}>
                  <h2 style={S.h2}>Fee Structure — 3-Way Split</h2>
                  {activeTier ? (()=>{
                    const adyenCost = calcAdyenCost(activeTier, analysis.totalVolume, analysis.totalTransactions);
                    const adyenRate = adyenCost/(analysis.totalVolume||1);
                    const myMarkup = Math.max(0,(analysis.processorFees||0)-adyenCost);
                    const myRate = myMarkup/(analysis.totalVolume||1);
                    const totalMarkup = myMarkup+(analysis.otherFees||0);
                    const totalMarkupRate = totalMarkup/(analysis.totalVolume||1);
                    const rows=[
                      {name:"Interchange",note:"Card network cost — non-negotiable",amt:analysis.interchangeFees,rate:analysis.interchangeRate,color:"#3b82f6"},
                      {name:`${activeProcessor.name} Cost`,note:"Your acquirer cost — processing + txn + scheme",amt:adyenCost,rate:adyenRate,color:T.gold},
                      {name:"Your Markup",note:"Processor markup above interchange & acquirer",amt:myMarkup,rate:myRate,color:T.green},
                      {name:"Other Fees",note:"Monthly, PCI, misc. — pure margin, no cost to you",amt:analysis.otherFees,rate:(analysis.otherFees||0)/(analysis.totalVolume||1),color:T.green},
                    ];
                    return(<div style={S.feeTable}>
                      {rows.map(r=>(<div key={r.name} style={S.feeRow}>
                        <div style={S.feeName}><span style={{color:r.color,fontWeight:600}}>{r.name}</span><span style={S.feeNote}>{r.note}</span></div>
                        <div style={S.feeAmt}>{fmt$(r.amt)}</div><div style={S.feeRate}>{fmtPct(r.rate)}</div>
                        <div style={S.feeBar}><div style={{...S.feeBarFill,width:`${Math.min(((r.amt||0)/(analysis.totalFees||1))*100,100)}%`,background:r.color}}/></div>
                      </div>))}
                      <div style={{...S.feeRow,background:`${T.green}08`,borderTop:`2px solid ${T.green}30`}}>
                        <div style={S.feeName}><span style={{color:T.green,fontWeight:700}}>Total Margin Opportunity</span><span style={S.feeNote}>Everything above interchange & acquirer cost</span></div>
                        <div style={{...S.feeAmt,color:T.green,fontWeight:700}}>{fmt$(totalMarkup)}</div>
                        <div style={{...S.feeRate,color:T.green,fontWeight:700}}>{fmtPct(totalMarkupRate)}</div>
                        <div style={S.feeBar}><div style={{...S.feeBarFill,width:`${Math.min((totalMarkup/(analysis.totalFees||1))*100,100)}%`,background:T.green}}/></div>
                      </div>
                    </div>);
                  })() : (
                    <div style={S.feeTable}>
                      {[{name:"Interchange",note:"Pass-through",amt:analysis.interchangeFees,rate:analysis.interchangeRate,color:"#3b82f6"},{name:"Processor Markup",note:"Where savings are found",amt:analysis.processorFees,rate:analysis.processorMarkup,color:"#f97316"},{name:"Other Fees",note:"Monthly, PCI, misc. — pure margin",amt:analysis.otherFees,rate:(analysis.otherFees||0)/(analysis.totalVolume||1),color:T.green}].map(r=>(
                        <div key={r.name} style={S.feeRow}>
                          <div style={S.feeName}><span style={{color:r.color,fontWeight:600}}>{r.name}</span><span style={S.feeNote}>{r.note}</span></div>
                          <div style={S.feeAmt}>{fmt$(r.amt)}</div><div style={S.feeRate}>{fmtPct(r.rate)}</div>
                          <div style={S.feeBar}><div style={{...S.feeBarFill,width:`${Math.min(((r.amt||0)/(analysis.totalFees||1))*100,100)}%`,background:r.color}}/></div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div style={S.highlightBox}>
                  <div style={S.hlLeft}>
                    <div style={S.hlTitle}>Total Margin Opportunity Above Interchange & Acquirer</div>
                    <div style={S.hlValue}>{fmtPct2((analysis.currentMargin||0)+((analysis.otherFees||0)/(analysis.totalVolume||1)))}</div>
                    <div style={S.hlSub}>Everything the merchant pays above hard costs</div>
                  </div>
                  <div style={S.hlRight}>
                    <div style={S.hlStat}><span style={S.hlStatNum}>{fmt$((analysis.processorFees||0)+(analysis.otherFees||0))}</span><span style={S.hlStatLbl}>Monthly Opportunity</span></div>
                    <div style={S.hlStat}><span style={S.hlStatNum}>{fmt$(((analysis.processorFees||0)+(analysis.otherFees||0))*12)}</span><span style={S.hlStatLbl}>Annual Opportunity</span></div>

                </div>

                <div style={S.section}>

                      <div key={m.label} style={S.mixCard}><div style={S.mixLbl}>{m.label}</div><div style={S.mixPct}>{fmtPct2(m.pct||0)}</div><div style={S.mixAmt}>{fmt$(m.amt)}</div></div>
                    ))}

                  <button style={{...S.btn,...S.btnPrimary}} onClick={()=>setStep("pricing")}>Select Pricing Model →</button>
                </div>
              </div>
            )}

            {step === "pricing" && analysis && activeTier !== undefined && (
              <PricingStep
                analysis={analysis}
                activeTier={activeTier || null}
                activeProcessor={activeProcessor || null}
                adyenCostRate={adyenCostRate || 0}
                targetMargin={targetMargin}
                setTargetMargin={setTargetMargin}
                pricingModel={pricingModel}
                setPricingModel={setPricingModel}
                feeOverrides={feeOverrides}
                setFeeOverrides={setFeeOverrides}
                loading={loading}
                onBack={()=>setStep("analysis")}
                onGenerate={generateProposal}
              />
            )}

            {/* ══ PROPOSAL ══ */}
            {step === "proposal" && proposal && analysis && (() => {
          // Compute effective rates directly from dollar amounts — never trust AI-returned rate fields
          const pVol = analysis.totalVolume || 1;
          const currentEffRate = (analysis.totalFees || 0) / pVol;
          const proposedEffRate = (proposal.projectedFees?.monthly || 0) / pVol;
          const savingsMonthly = (analysis.totalFees || 0) - (proposal.projectedFees?.monthly || 0);
          const savingsAnnual  = savingsMonthly * 12;
          const savingsPct     = (analysis.totalFees || 0) > 0 ? savingsMonthly / (analysis.totalFees || 1) : 0;
          return (
              <div style={S.panel}>

                  <div style={{display:"flex",gap:24,alignItems:"center",flexWrap:"wrap"}}>

      </main>

// ─── Pricing Step Component ───────────────────────────────────────────────────
function PricingStep({ analysis, activeTier, activeProcessor, adyenCostRate, targetMargin, setTargetMargin, pricingModel, setPricingModel, feeOverrides, setFeeOverrides, loading, onBack, onGenerate }) {
  if (!analysis) return null;
  const vol   = analysis.totalVolume || 0;
  const txns  = analysis.totalTransactions || 0;
  const annVol = analysis.annualVolume || vol * 12;
  const icRate = analysis.interchangeRate || 0;
  const existingMargin = analysis.currentMargin || 0;
  const currentEffective = analysis.effectiveRate || 0;

  // Net margin after acquirer cost
  const netMargin = targetMargin - adyenCostRate;
  const belowFloor = netMargin < 0;

  // ── Derived rates from fee overrides ──────────────────────────────────────
  // For flat-rate: targetMargin = flatRate - icRate, but we also need to absorb
  // monthly fee and per-txn fee. Solve for the % rate that achieves targetMargin.
  // revenue needed = vol * targetMargin
  // revenue from perTxn = txns * perTxnFee
  // revenue from monthly = monthlyFee
  // remaining needed from % = vol * targetMargin - txns*perTxn - monthlyFee
  // flatRate = icRate + (remaining / vol)
  const flatRevNeeded  = vol * targetMargin;
  const flatFeeRevenue = txns * (feeOverrides.perTxnFee || 0) + (feeOverrides.monthlyFee || 0);
  const flatPctRevNeeded = Math.max(0, flatRevNeeded - flatFeeRevenue);
  const derivedFlatRate  = icRate + flatPctRevNeeded / (vol || 1);

  // For 2-tier: split volume between CP and CNP
  const cpVol  = analysis.cardPresentVolume    || vol * (analysis.cardPresentPct    || 0.7);
  const cnpVol = analysis.cardNotPresentVolume || vol * (analysis.cardNotPresentPct || 0.3);
  // CP interchange is typically ~1.5%, CNP ~1.9% — use proportional share of total IC
  const cpIcRate  = cpVol  > 0 ? (icRate * vol * (analysis.cardPresentPct    || 0.7)) / (cpVol  || 1) : icRate * 0.85;
  const cnpIcRate = cnpVol > 0 ? (icRate * vol * (analysis.cardNotPresentPct || 0.3)) / (cnpVol || 1) : icRate * 1.15;

  const cpRevNeeded   = cpVol  * targetMargin;
  const cnpRevNeeded  = cnpVol * targetMargin;
  const cpFeeRev      = txns * (analysis.cardPresentPct || 0.7) * (feeOverrides.cpPerTxnFee  || 0) + (feeOverrides.monthlyFee || 0) * (analysis.cardPresentPct || 0.7);
  const cnpFeeRev     = txns * (analysis.cardNotPresentPct || 0.3) * (feeOverrides.cnpPerTxnFee || 0) + (feeOverrides.monthlyFee || 0) * (analysis.cardNotPresentPct || 0.3);
  const derivedCPRate  = cpIcRate  + Math.max(0, cpRevNeeded  - cpFeeRev)  / (cpVol  || 1);
  const derivedCNPRate = cnpIcRate + Math.max(0, cnpRevNeeded - cnpFeeRev) / (cnpVol || 1);

  // ── Merchant savings preview ──────────────────────────────────────────────
  const currentMonthlyFees = analysis.totalFees || 0;
  let proposedMonthlyFees = 0;
  if (pricingModel === "flat-rate") {
    proposedMonthlyFees = vol * derivedFlatRate + txns * (feeOverrides.perTxnFee || 0) + (feeOverrides.monthlyFee || 0);
  } else if (pricingModel === "2-tier") {
    proposedMonthlyFees = cpVol * derivedCPRate + txns*(analysis.cardPresentPct||0.7)*(feeOverrides.cpPerTxnFee||0)
      + cnpVol * derivedCNPRate + txns*(analysis.cardNotPresentPct||0.3)*(feeOverrides.cnpPerTxnFee||0)
      + (feeOverrides.monthlyFee || 0);
  } else {
    // interchange-plus: proposed = IC passthrough + markup
    proposedMonthlyFees = vol * icRate + vol * targetMargin + txns * (feeOverrides.perTxnFee || 0) + (feeOverrides.monthlyFee || 0);
  }
  const merchantSavingsMonthly = currentMonthlyFees - proposedMonthlyFees;
  const merchantSavingsAnnual  = merchantSavingsMonthly * 12;
  const merchantSavingsPct     = currentMonthlyFees > 0 ? merchantSavingsMonthly / currentMonthlyFees : 0;
  const proposedEffective      = vol > 0 ? proposedMonthlyFees / vol : 0;

  const [feeInputs, setFeeInputs] = useState({
    monthlyFee: feeOverrides.monthlyFee > 0 ? String(feeOverrides.monthlyFee) : "",
    perTxnFee:  feeOverrides.perTxnFee  > 0 ? String(feeOverrides.perTxnFee)  : "",
    cpPerTxnFee: feeOverrides.cpPerTxnFee > 0 ? String(feeOverrides.cpPerTxnFee) : "",
    cnpPerTxnFee: feeOverrides.cnpPerTxnFee > 0 ? String(feeOverrides.cnpPerTxnFee) : "",
  });

  const upd = (k, v) => {
    setFeeInputs(prev => ({ ...prev, [k]: v }));
    const parsed = parseFloat(v);
    setFeeOverrides(prev => ({ ...prev, [k]: isNaN(parsed) ? 0 : parsed }));
  };

  return (
    <div style={S.panel}>
      <h1 style={S.h1}>Configure Your Proposal</h1>
      <p style={S.sub}>Set your pricing model, fees, and target margin. Rates are calculated automatically to hit your margin.</p>

      {/* Current vs proposed snapshot */}
      <div style={S.snapshotRow}>
        <div style={S.snapshotCard}>
          <div style={S.snapLabel}>Current Processor Margin</div>
          <div style={{...S.snapVal, color: T.accent}}>{fmtPct2(existingMargin)}</div>
          <div style={S.snapSub}>above interchange · {fmt$(vol * existingMargin)}/mo</div>
        </div>
        <div style={{...S.snapshotCard, background:`${T.green}08`, border:`1px solid ${T.green}30`}}>
          <div style={S.snapLabel}>Your Target Margin</div>
          <div style={{...S.snapVal, color: T.green}}>{fmtPct2(targetMargin)}</div>
          <div style={S.snapSub}>above interchange · {fmt$(vol * targetMargin)}/mo</div>
        </div>
        <div style={{...S.snapshotCard, background: merchantSavingsMonthly > 0 ? `${T.green}08` : `${T.red}08`, border:`1px solid ${merchantSavingsMonthly>0?T.green:T.red}30`}}>
          <div style={S.snapLabel}>Merchant Savings</div>
          <div style={{...S.snapVal, color: merchantSavingsMonthly > 0 ? T.green : T.red}}>{fmt$(merchantSavingsMonthly)}/mo</div>
          <div style={S.snapSub}>{fmt$(merchantSavingsAnnual)}/yr · {fmtPct2(Math.abs(merchantSavingsPct))} {merchantSavingsMonthly>=0?"reduction":"increase"}</div>
        </div>
        <div style={S.snapshotCard}>
          <div style={S.snapLabel}>Proposed Effective Rate</div>
          <div style={{...S.snapVal, color: T.white}}>{pricingModel ? fmtPct2(proposedEffective) : "—"}</div>
          <div style={S.snapSub}>was {fmtPct2(currentEffective)}</div>
        </div>
      </div>

      {/* Pricing model selector */}
      <div style={S.section}>
        <h2 style={S.h2}>Pricing Model</h2>
        <div style={S.modelGrid}>
          {[
            {id:"2-tier",name:"2-Tier Pricing",icon:"⬛",desc:"Separate rates for card-present and card-not-present.",pros:["Simple to explain","Predictable costs","Good for high CP volume"],cons:["Less transparent"]},
            {id:"interchange-plus",name:"Interchange Plus",icon:"◎",desc:"Transparent cost pass-through plus a fixed markup.",pros:["Fully transparent","Lower effective rate"],cons:["Variable bills","More complex"]},
            {id:"flat-rate",name:"Flat Rate",icon:"▬",desc:"One rate for all card types.",pros:["Simplest billing","Easy to budget"],cons:["May overpay on debit"]},
          ].map(m=>(
            <div key={m.id} style={{...S.modelCard,...(pricingModel===m.id?S.modelSelected:{})}} onClick={()=>setPricingModel(m.id)}>
              <div style={S.modelIcon}>{m.icon}</div><div style={S.modelName}>{m.name}</div><div style={S.modelDesc}>{m.desc}</div>

      {/* Margin slider */}
      <div style={S.section}>

        <div style={S.sliderBox}>

            <div style={S.msArrRow}><span style={S.msArrLabel}>Net ARR</span>                  <span style={{...S.msArrVal,color:belowFloor?T.red:T.blue}}>{fmt$(annVol*netMargin)}</span></div>
          </div>
        </div>
      </div>

      {/* Fee configuration — flat rate */}
      {pricingModel === "flat-rate" && (
        <div style={S.section}>
          <h2 style={S.h2}>Flat Rate — Fee Configuration</h2>
          <div style={S.feeConfigBox}>
            <p style={{fontSize:13,color:T.muted,marginBottom:20}}>Set any fixed fees below. The discount rate is automatically calculated so your total revenue still hits your target margin.</p>

              <div style={S.feeConfigField}>
                <label style={S.manualLabel}>Monthly Fee ($)</label>
                <div style={S.manualInputRow}><input type="text" inputMode="decimal" value={feeInputs.monthlyFee} placeholder="0.00" onChange={e=>upd("monthlyFee",e.target.value)} style={S.manualInput}/><span style={S.manualUnit}>$/mo</span></div>
                <div style={S.feeConfigHint}>Flat monthly service fee</div>
              </div>
              <div style={S.feeConfigField}>
                <label style={S.manualLabel}>Per Transaction Fee ($)</label>
                <div style={S.manualInputRow}><input type="text" inputMode="decimal" value={feeInputs.perTxnFee} placeholder="0.00" onChange={e=>upd("perTxnFee",e.target.value)} style={S.manualInput}/><span style={S.manualUnit}>$/txn</span></div>
                <div style={S.feeConfigHint}>Applied to every transaction</div>
              </div>
              <div style={{...S.feeConfigField,...S.feeConfigResult}}>
                <label style={S.manualLabel}>Calculated Discount Rate</label>
                <div style={{fontSize:32,fontWeight:800,color:T.accent,margin:"8px 0"}}>{fmtPct2(derivedFlatRate)}</div>
                <div style={S.feeConfigHint}>Rate needed to hit {fmtPct2(targetMargin)} margin after fees</div>
              </div>
            </div>
            <div style={S.feeBreakdown}>
              {[
                {label:"Revenue from % rate", val: fmt$(vol * derivedFlatRate)},
                {label:"Revenue from per-txn", val: fmt$(txns * (feeOverrides.perTxnFee||0))},
                {label:"Revenue from monthly fee", val: fmt$(feeOverrides.monthlyFee||0)},
                {label:"Total gross revenue", val: fmt$(proposedMonthlyFees), bold:true, color:T.accent},
                {label:"Merchant saves vs. current", val: fmt$(merchantSavingsMonthly), bold:true, color: merchantSavingsMonthly>=0?T.green:T.red},
              ].map((r,i)=>(
                <div key={i} style={{...S.feeBreakdownRow,...(r.bold?{borderTop:`1px solid ${T.cardBorder}`,marginTop:4,paddingTop:8}:{})}}>

      )}

      {/* Fee configuration — 2-tier */}
      {pricingModel === "2-tier" && (
        <div style={S.section}>
          <h2 style={S.h2}>2-Tier Pricing — Fee Configuration</h2>
          <div style={S.feeConfigBox}>
            <p style={{fontSize:13,color:T.muted,marginBottom:20}}>Set per-transaction fees for each tier. Discount rates are calculated automatically to hit your target margin across the blended volume.</p>
            <div style={S.feeConfigGrid}>
              <div style={S.feeConfigField}>
                <label style={S.manualLabel}>Monthly Fee ($)</label>
                <div style={S.manualInputRow}><input type="text" inputMode="decimal" value={feeInputs.monthlyFee} placeholder="0.00" onChange={e=>upd("monthlyFee",e.target.value)} style={S.manualInput}/><span style={S.manualUnit}>$/mo</span></div>
                <div style={S.feeConfigHint}>Shared monthly service fee</div>
              </div>
              <div style={S.feeConfigField}>
                <label style={S.manualLabel}>Card Present Per-Txn ($)</label>
                <div style={S.manualInputRow}><input type="text" inputMode="decimal" value={feeInputs.cpPerTxnFee} placeholder="0.00" onChange={e=>upd("cpPerTxnFee",e.target.value)} style={S.manualInput}/><span style={S.manualUnit}>$/txn</span></div>
                <div style={S.feeConfigHint}>CP transactions</div>
              </div>
              <div style={S.feeConfigField}>
                <label style={S.manualLabel}>Card Not Present Per-Txn ($)</label>
                <div style={S.manualInputRow}><input type="text" inputMode="decimal" value={feeInputs.cnpPerTxnFee} placeholder="0.00" onChange={e=>upd("cnpPerTxnFee",e.target.value)} style={S.manualInput}/><span style={S.manualUnit}>$/txn</span></div>
                <div style={S.feeConfigHint}>CNP transactions</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginTop:20}}>
              {[
                {label:"Card Present Rate", rate:derivedCPRate, vol:cpVol, txnFee:feeOverrides.cpPerTxnFee||0, pct:analysis.cardPresentPct||0.7, color:"#3b82f6"},
                {label:"Card Not Present Rate", rate:derivedCNPRate, vol:cnpVol, txnFee:feeOverrides.cnpPerTxnFee||0, pct:analysis.cardNotPresentPct||0.3, color:T.accent},
              ].map(r=>(
                <div key={r.label} style={{...S.feeConfigResult, background:T.card, border:`1px solid ${r.color}40`, borderRadius:10, padding:20}}>
                  <div style={{fontSize:11,color:T.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>{r.label}</div>
                  <div style={{fontSize:36,fontWeight:800,color:r.color}}>{fmtPct2(r.rate)}</div>
                  <div style={{fontSize:12,color:T.muted,marginTop:6}}>+ ${r.txnFee.toFixed(2)}/txn</div>

                </div>
              ))}
            </div>
            <div style={S.feeBreakdown}>
              {[
                {label:"CP revenue (rate + per-txn)", val: fmt$(cpVol*derivedCPRate + txns*(analysis.cardPresentPct||0.7)*(feeOverrides.cpPerTxnFee||0))},
                {label:"CNP revenue (rate + per-txn)", val: fmt$(cnpVol*derivedCNPRate + txns*(analysis.cardNotPresentPct||0.3)*(feeOverrides.cnpPerTxnFee||0))},
                {label:"Monthly fee revenue", val: fmt$(feeOverrides.monthlyFee||0)},
                {label:"Total gross revenue", val: fmt$(proposedMonthlyFees), bold:true, color:T.accent},

              ].map((r,i)=>(
                <div key={i} style={{...S.feeBreakdownRow,...(r.bold?{borderTop:`1px solid ${T.cardBorder}`,marginTop:4,paddingTop:8}:{})}}>

                  <span style={{fontSize:14,fontWeight:r.bold?700:400,color:r.color||T.white}}>{r.val}</span>

      {/* IC+ fee config */}
      {pricingModel === "interchange-plus" && (
        <div style={S.section}>
          <h2 style={S.h2}>Interchange Plus — Fee Configuration</h2>
          <div style={S.feeConfigBox}>
            <p style={{fontSize:13,color:T.muted,marginBottom:20}}>Set optional fixed fees. The BPS markup is driven by your target margin slider above.</p>
            <div style={S.feeConfigGrid}>
              <div style={S.feeConfigField}>
                <label style={S.manualLabel}>Monthly Fee ($)</label>
                <div style={S.manualInputRow}><input type="text" inputMode="decimal" value={feeInputs.monthlyFee} placeholder="0.00" onChange={e=>upd("monthlyFee",e.target.value)} style={S.manualInput}/><span style={S.manualUnit}>$/mo</span></div>
              </div>
              <div style={S.feeConfigField}>
                <label style={S.manualLabel}>Per Transaction Fee ($)</label>
                <div style={S.manualInputRow}><input type="text" inputMode="decimal" value={feeInputs.perTxnFee} placeholder="0.00" onChange={e=>upd("perTxnFee",e.target.value)} style={S.manualInput}/><span style={S.manualUnit}>$/txn</span></div>
              </div>
              <div style={{...S.feeConfigResult, background:T.card, border:`1px solid ${T.accent}40`, borderRadius:10, padding:20}}>

                {label:"Monthly fee revenue", val: fmt$(feeOverrides.monthlyFee||0)},

              ].map((r,i)=>(

      <div style={S.btnRow}>

      </div>
    </div>
  );
}

// ─── Processors Tab ───────────────────────────────────────────────────────────
function ProcessorsTab({ settings, persistSettings }) {
  const [extractingId, setExtractingId] = useState(null);
  const [editingTierId, setEditingTierId] = useState(null);
  const [expandedId, setExpandedId] = useState(null);
  const fileRefs = useRef({});

  const addProcessor = () => {
    const p = newProcessor();
    const updated = { ...settings, processors: [...(settings.processors||[]), p], activeProcessorId: settings.activeProcessorId || p.id };
    persistSettings(updated);
    setExpandedId(p.id);
  };

  const updateProcessor = (id, changes) => {
    const updated = { ...settings, processors: settings.processors.map(p => p.id===id ? {...p,...changes} : p) };
    persistSettings(updated);
  };

  const deleteProcessor = (id) => {
    const updated = { ...settings, processors: settings.processors.filter(p=>p.id!==id), activeProcessorId: settings.activeProcessorId===id ? null : settings.activeProcessorId };
    persistSettings(updated);
  };

  const setActive = (id) => persistSettings({ ...settings, activeProcessorId: id });

  const setActiveTier = (processorId, tierId) => updateProcessor(processorId, { activeTierId: tierId });

  const extractRates = async (proc, fileData) => {
    setExtractingId(proc.id);
    try {
      const res = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://api.anthropic.com/v1/messages"), {
        method:"POST", headers:{"Content-Type":"application/json","x-api-key":window.__CR_API_KEY||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1200,
          messages:[{role:"user",content:[
            {type:"document",source:{type:"base64",media_type:"application/pdf",data:fileData}},
            {type:"text",text:`Extract ALL acquirer/processor cost data from this contract. Return ONLY JSON:
{
  "processingBps": number (base processing fee as decimal, e.g. 0.0008 for 8bps),
  "perTxnFee": number (per-transaction fee USD),
  "schemeBps": number (card scheme/network pass-through as decimal),
  "monthlyFee": number (fixed monthly USD),
  "isTiered": boolean,
  "tiers": [
    {
      "id": "tier_1",
      "label": "Tier 1 — Up to $X/mo",
      "minVolume": number (monthly volume floor USD, 0 for first tier),
      "maxVolume": number or null (monthly volume ceiling USD, null for top tier),
      "processingBps": number,
      "perTxnFee": number,
      "schemeBps": number,
      "monthlyFee": number
    }
  ],
  "currency": "USD",
  "notes": "string",
  "confidence": "high|medium|low"
}
For tiers, set label like "Tier 1 — $0–$500K/mo", "Tier 2 — $500K–$2M/mo" etc based on the volume thresholds in the contract.
If not tiered, still populate tiers array with a single entry using the base rates and label "Standard Rate".
Never use null for numeric fields — use 0.`}
          ]}]
        })
      });
      const data = await res.json();
      const parsed = parseJSON(data.content?.map(b=>b.text||"").join("")||"");
      if (parsed) {
        // Normalize rate fields: if AI returned a percentage (e.g. 5 for 500bps) instead of decimal (0.05), fix it
        const normalizeBps = v => (v != null && v > 0.5) ? v / 100 : (v || 0);
        const normalizeTier = t => ({...t, processingBps: normalizeBps(t.processingBps), schemeBps: normalizeBps(t.schemeBps)});
        parsed.processingBps = normalizeBps(parsed.processingBps);
        parsed.schemeBps = normalizeBps(parsed.schemeBps);
        if (!parsed.tiers || parsed.tiers.length===0) {
          parsed.tiers = [{id:"flat",label:"Standard Rate",minVolume:0,maxVolume:null,processingBps:parsed.processingBps,perTxnFee:parsed.perTxnFee,schemeBps:parsed.schemeBps,monthlyFee:parsed.monthlyFee}];
        }
        parsed.tiers = parsed.tiers.map((t,i)=>({...normalizeTier(t), id: t.id||`tier_${i+1}`}));
        updateProcessor(proc.id, { rates: parsed, activeTierId: parsed.tiers[0]?.id });
      } else { alert("Could not parse contract. Check the PDF and try again."); }
    } catch(err) { alert("Error: "+err.message); }
    setExtractingId(null);
  };

  const handleFileUpload = (proc, file) => {
    if (!file) return;
    updateProcessor(proc.id, { contractFile: file.name });
    const reader = new FileReader();
    reader.onload = e => extractRates(proc, e.target.result.split(",")[1]);
    reader.readAsDataURL(file);
  };

  const updateTier = (procId, tierId, field, val) => {
    const proc = settings.processors.find(p=>p.id===procId);
    if (!proc?.rates) return;
    const tiers = proc.rates.tiers.map(t => t.id===tierId ? {...t,[field]:val} : t);
    updateProcessor(procId, { rates: {...proc.rates, tiers} });
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <p style={{color:T.muted,fontSize:14}}>Upload processor contracts to enable true net margin calculations in proposals.</p>
        <button style={{...S.btn,...S.btnPrimary,padding:"10px 20px"}} onClick={addProcessor}>+ Add Processor</button>
      </div>

      {(!settings.processors||settings.processors.length===0) && (
        <div style={{...S.emptyState}}><div style={{fontSize:40,marginBottom:16}}>◈</div><div style={{fontSize:16,color:T.white,marginBottom:8}}>No processors yet</div><div style={{fontSize:14,color:T.muted}}>Add your first acquirer contract to get started.</div></div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {(settings.processors||[]).map(proc => {
          const isActive = settings.activeProcessorId === proc.id;
          const isExpanded = expandedId === proc.id;
          const isExtracting = extractingId === proc.id;
          const activeTier = proc.rates?.tiers?.find(t=>t.id===proc.activeTierId) || proc.rates?.tiers?.[0];

          return (
            <div key={proc.id} style={{...S.procCard,...(isActive?S.procCardActive:{})}}>
              {/* Card header */}
              <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:200}}>
                  <input
                    value={proc.name}
                    onChange={e=>updateProcessor(proc.id,{name:e.target.value})}
                    style={S.procNameInput}
                    placeholder="Processor / Acquirer Name"
                  />
                  {proc.rates && activeTier && (
                    <div style={{fontSize:12,color:T.muted,marginTop:4}}>
                      {fmtBps(activeTier.processingBps)} + ${(activeTier.perTxnFee||0).toFixed(4)}/txn
                      {proc.rates.isTiered && <span style={{color:T.gold,marginLeft:8}}>· {proc.rates.tiers?.length} tiers</span>}
                    </div>
                  )}
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  {isActive
                    ? <div style={S.activePill}>✓ Active</div>
                    : <button style={{...S.btn,...S.btnSecondary,padding:"6px 14px",fontSize:12}} onClick={()=>setActive(proc.id)}>Set Active</button>
                  }
                  <button style={{...S.btn,...S.btnGhost,padding:"6px 14px",fontSize:12}} onClick={()=>setExpandedId(isExpanded?null:proc.id)}>
                    {isExpanded?"Collapse ▲":"Edit ▼"}
                  </button>
                  <button style={{...S.btn,background:"transparent",color:T.red,border:`1px solid ${T.red}40`,padding:"6px 14px",fontSize:12}} onClick={()=>deleteProcessor(proc.id)}>Delete</button>
                </div>
              </div>

              {/* Expanded section */}
              {isExpanded && (
                <div style={{marginTop:24,paddingTop:24,borderTop:`1px solid ${T.cardBorder}`}}>
                  {/* Contract upload */}
                  <div style={{marginBottom:24}}>
                    <div style={S.manualTitle}>Contract PDF</div>
                    <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                      <input ref={el=>fileRefs.current[proc.id]=el} type="file" accept=".pdf" style={{display:"none"}}
                        onChange={e=>handleFileUpload(proc,e.target.files[0])}/>
                      <button style={{...S.btn,...S.btnSecondary,padding:"8px 16px",fontSize:13}} onClick={()=>fileRefs.current[proc.id]?.click()} disabled={isExtracting}>
                        {isExtracting ? "⏳ Extracting rates..." : proc.contractFile ? "↺ Re-upload Contract" : "⬆ Upload Contract PDF"}
                      </button>
                      {proc.contractFile && <span style={{fontSize:13,color:T.muted}}>{proc.contractFile}</span>}
                      {proc.rates && <span style={{fontSize:12,color:T.green}}>✓ Rates extracted · {proc.rates.confidence} confidence</span>}
                    </div>
                    {proc.rates?.notes && <p style={{...S.adyenNote,marginTop:8}}>{proc.rates.notes}</p>}
                  </div>

                  {/* Tiers */}
                  {proc.rates?.tiers && proc.rates.tiers.length > 0 && (
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                        <div style={S.manualTitle}>Pricing Tiers — Select Active Tier for Proposals</div>
                        <button style={{...S.btn,...S.btnGhost,padding:"4px 12px",fontSize:11}} onClick={()=>{
                          const newTier={id:`tier_${Date.now()}`,label:"New Tier",minVolume:0,maxVolume:null,processingBps:0,perTxnFee:0,schemeBps:0,monthlyFee:0};
                          updateProcessor(proc.id,{rates:{...proc.rates,tiers:[...proc.rates.tiers,newTier],isTiered:true}});
                        }}>+ Add Tier</button>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        {proc.rates.tiers.map((tier,ti)=>{
                          const isTierActive = (proc.activeTierId||proc.rates.tiers[0]?.id) === tier.id;
                          const isEditingThis = editingTierId === `${proc.id}_${tier.id}`;
                          return (
                            <div key={tier.id} style={{...S.tierCard,...(isTierActive?S.tierCardActive:{})}}>
                              <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                                <div style={{flex:1}}>
                                  {isEditingThis
                                    ? <input value={tier.label} onChange={e=>updateTier(proc.id,tier.id,"label",e.target.value)} style={{...S.manualInput,fontSize:14,fontWeight:600,width:"100%"}}/>
                                    : <div style={{fontSize:14,fontWeight:600,color:isTierActive?T.white:T.text}}>{tier.label}</div>
                                  }
                                  <div style={{fontSize:12,color:T.muted,marginTop:3}}>
                                    {fmtBps(tier.processingBps)} processing · ${(tier.perTxnFee||0).toFixed(4)}/txn{tier.schemeBps>0?` · ${fmtBps(tier.schemeBps)} scheme`:""}{tier.monthlyFee>0?` · ${fmt$(tier.monthlyFee)}/mo`:""}
                                  </div>
                                </div>
                                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                                  {isTierActive ? <div style={S.activePill}>✓ Active</div> : <button style={{...S.btn,...S.btnGhost,padding:"4px 12px",fontSize:11}} onClick={()=>setActiveTier(proc.id,tier.id)}>Use This Tier</button>}
                                  <button style={{...S.btn,...S.btnGhost,padding:"4px 12px",fontSize:11}} onClick={()=>setEditingTierId(isEditingThis?null:`${proc.id}_${tier.id}`)}>{isEditingThis?"Done":"Edit"}</button>
                                </div>
                              </div>
                              {isEditingThis && (
                                <div style={{...S.manualGrid,marginTop:14}}>
                                  {[
                                    {label:"Min Volume ($/mo)",key:"minVolume",scale:1,unit:"$"},
                                    {label:"Max Volume ($/mo)",key:"maxVolume",scale:1,unit:"$"},
                                    {label:"Processing (BPS)",key:"processingBps",scale:10000,unit:"bps"},
                                    {label:"Per Transaction ($)",key:"perTxnFee",scale:1,unit:"$"},
                                    {label:"Scheme Fees (BPS)",key:"schemeBps",scale:10000,unit:"bps"},
                                    {label:"Monthly Fee ($)",key:"monthlyFee",scale:1,unit:"$"},
                                  ].map(({label,key,scale,unit})=>(
                                    <div key={key} style={S.manualField}>
                                      <label style={S.manualLabel}>{label}</label>
                                      <div style={S.manualInputRow}>
                                        <input type="number" step="any"
                                          value={scale===10000?Math.round((tier[key]||0)*10000):(tier[key]||0)}
                                          onChange={e=>updateTier(proc.id,tier.id,key,scale===10000?parseFloat(e.target.value||0)/10000:parseFloat(e.target.value||0))}
                                          style={S.manualInput}/>
                                        <span style={S.manualUnit}>{unit}</span>
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
